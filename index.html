## Golden Rule
> One agent, one layer, one context window. Never mix DB/BE/FE prompts.

## Naming (Oracle 19c)
- Tables: UPPER_SNAKE, max 30 chars, prefix APP_
- Sequences: SEQ_<TABLE>, allocationSize=1
- No VARCHAR, use VARCHAR2(4000) or CLOB
- Avoid reserved words: USER -> APP_USER

## Loop Protocol
1. Read CONTEXT.md (max 800 tokens)
2. Read scratchpad.json
3. Execute your layer
4. Write results to scratchpad
5. Exit - do not call next agent

## Anti-Patterns
❌ One giant prompt for full stack
❌ Flyway V1 edits after commit
❌ JPA GenerationType.IDENTITY on Oracle

- FE: Angular 18.2 standalone, signals, Tailwind
- BE: Spring Boot 3.3.2, Java 21, Hibernate 6
- DB: Oracle 19c XEPDB1, Flyway 10.15.0

## Current State
- Auth module done (JWT)
- User table: APP_USER (ID, EMAIL, PASSWORD_HASH)
- API base: /api/v1

## Conventions
- API: /api/v1/{resource}
- Dates: Instant in BE, ISO string in FE
- Errors: { code: "ORA_xxx", message: "..." }

## Oracle Gotchas
- Empty string = NULL in Oracle!
- Need explicit sequence sync after manual inserts
